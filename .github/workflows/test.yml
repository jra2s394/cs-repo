name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel a superseded run when a new commit lands on the same branch /
# PR. Keeps the queue moving when you push multiple times in a row.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Configure git identity (needed by branch-enforcer tests)
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI"

      # Single pytest run with coverage. Previously CI ran pytest twice
      # (once for results, once for coverage); --cov is a superset of the
      # plain run, so collapsing them saves ~30s/run.
      - name: Run Python tests (with coverage)
        run: python3 -m pytest --cov=hooks --cov=lib --cov-report=term-missing --tb=short -q

      - name: Lint Python (ruff)
        run: make lint-py

      - name: Lint JS (biome)
        run: make lint-js

      - name: Run JS tests
        run: make test-js
