name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Configure git identity (needed by branch-enforcer tests)
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI"

      - name: Run Python tests
        run: python3 -m pytest --tb=short -q

      - name: Lint Python (ruff)
        run: make lint-py

      - name: Lint JS (biome)
        run: make lint-js

      - name: Run JS tests
        run: make test-js

      - name: Run Python tests with coverage
        run: python3 -m pytest --cov=hooks --cov=lib --cov-report=term-missing -q
