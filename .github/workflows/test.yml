name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel a superseded run when a new commit lands on the same branch /
# PR. Keeps the queue moving when you push multiple times in a row.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the floor declared in pyproject.toml (`requires-python = ">=3.10"`)
        # and Anthropic's currently-supported Python range. 3.9 is intentionally
        # excluded — round-27 found our pinned pillow/pytest/matplotlib versions
        # require 3.10+; this matrix catches drift between the declared floor
        # and what actually works in CI.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt pre-commit

      - name: Install Node dependencies
        run: npm ci

      - name: Configure git identity (needed by branch-enforcer tests)
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI"

      # Single pytest run with coverage. Previously CI ran pytest twice
      # (once for results, once for coverage); --cov is a superset of the
      # plain run, so collapsing them saves ~30s/run.
      #
      # --cov-fail-under=85 locks in the current floor (~90% combined across
      # the line-tested files: lib/report_charts.py at 100% and
      # hooks/session-to-obsidian.py at ~89% after round 43 added main()
      # integration tests). Was 70 before round 43 — bumped after the orchestration
      # coverage gap closed. Subprocess-tested hooks are omitted per .coveragerc.
      # The 5-point buffer below current lets a small defensive branch land
      # without an immediate test but catches a deleted test file or regression.
      - name: Run Python tests (with coverage)
        run: python3 -m pytest --cov=hooks --cov=lib --cov-report=term-missing --cov-fail-under=85 --tb=short -q

      - name: Lint Python (ruff)
        run: make lint-py

      - name: Type-check Python (mypy)
        run: make typecheck

      - name: Lint JS (biome)
        run: make lint-js

      # Pre-commit hooks: trailing whitespace, end-of-file fixer, json/yaml
      # validity, large-file guard, merge-conflict markers, detect-private-key.
      # Catches what ruff/biome alone don't. Locally these fire on `git commit`
      # once a contributor runs `pre-commit install`; CI enforces the same set
      # regardless of whether they've done that step.
      - name: Pre-commit hooks
        run: pre-commit run --all-files

      # JS tests run under c8 for coverage tracking and threshold enforcement.
      # Baseline is ~82% lines combined (lib/ ~99%, reports/ ~78%); floor is
      # 75 lines per package.json::c8. Same buffer pattern as Python's
      # --cov-fail-under: pinned a few points below current so a defensive
      # branch can land without an immediate test, but catches a deleted
      # test file or a major regression.
      - name: Run JS tests (with coverage)
        run: make test-js-cov
