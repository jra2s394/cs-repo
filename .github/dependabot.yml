# Weekly dependency updates. Groups patch/minor bumps into a single PR per
# ecosystem to keep PR volume manageable; major bumps still land separately
# so they get reviewed individually.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "ci"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      python:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      node:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps"
