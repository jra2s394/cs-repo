# pre-commit hooks — run the same checks Claude Code's hooks enforce, but
# for non-Claude commits too (web edits via GitHub UI won't run these, but
# every clone-and-commit path will).
#
# Setup:
#   pip install pre-commit
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Both whitespace-fixers below skip files that macOS TCC has put
      # under write protection once Claude Code touches them. Started as
      # just .claude/settings.json (round 53), spread to every hooks/*.py
      # file (round 56 morning), then spread to every .claude/commands/*.md
      # file (round 56 afternoon). The pattern is "any file Claude Code's
      # Edit/Write tool has written gets TCC-protected" — which covers
      # essentially everything under .claude/ and the hook scripts.
      #
      # Both hooks open files in rb+ mode (read-write) to check, so they
      # hit PermissionError even when the file's content is already
      # correct. The repo convention is "all files end with newline and
      # have no trailing whitespace" — we rely on editors/Claude Code to
      # maintain that for the excluded paths, since the hooks can't
      # enforce it on them. Same pattern as the detect-private-key
      # exclusion below for the secret-scan test file.
      - id: trailing-whitespace
        exclude: '\.md$|^\.claude/|^hooks/'
      - id: end-of-file-fixer
        exclude: '^\.claude/|^hooks/'
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
        # The secret-scan test file contains deliberate
        # PEM-block-shaped fixtures (RSA, GCP service-account, etc.) used
        # to verify that our own hooks/secret-scan.py BLOCKS commits
        # containing those patterns. Same allow-listing pattern as
        # `hooks/secret-scan.py::ALLOW_PATHS`.
        exclude: '^tests/hooks/test_secret_scan\.py$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ['--fix']

  - repo: local
    hooks:
      - id: biome
        name: biome check
        entry: npx --no-install biome check
        language: system
        types_or: [javascript, json]
        pass_filenames: false
