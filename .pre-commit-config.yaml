# pre-commit hooks — run the same checks Claude Code's hooks enforce, but
# for non-Claude commits too (web edits via GitHub UI won't run these, but
# every clone-and-commit path will).
#
# Setup:
#   pip install pre-commit
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'  # markdown line breaks rely on trailing spaces
      - id: end-of-file-fixer
        # macOS TCC protects .claude/settings.json once Claude Code has
        # written to it — opening in `rb+` mode (which end-of-file-fixer
        # always does) hits PermissionError even when the file already
        # ends with a newline. We commit the file with a final newline
        # by convention; the hook's check is redundant for this path.
        exclude: '^\.claude/settings\.json$'
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
        # The secret-scan test file contains deliberate
        # PEM-block-shaped fixtures (RSA, GCP service-account, etc.) used
        # to verify that our own hooks/secret-scan.py BLOCKS commits
        # containing those patterns. Same allow-listing pattern as
        # `hooks/secret-scan.py::ALLOW_PATHS`.
        exclude: '^tests/hooks/test_secret_scan\.py$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ['--fix']

  - repo: local
    hooks:
      - id: biome
        name: biome check
        entry: npx --no-install biome check
        language: system
        types_or: [javascript, json]
        pass_filenames: false
